name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}}}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}}}
      ADMIN_PASSWORD: "MiSub_ahZ6lB673D8w"
      COOKIE_SECRET: "fb8ce5d2-e7b2-47be-bd09-f622eab89685"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Set KV cookie secret
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/storage/kv/namespaces/$MISUB_KV_NAMESPACE/keys/SYSTEM_COOKIE_SECRET/value" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: text/plain" \
            -d '"fb8ce5d2-e7b2-47be-bd09-f622eab89685"'
        env:
          MISUB_KV_NAMESPACE: ${{ secrets.MISUB_KV_NAMESPACE }}}}

      - name: Deploy to Cloudflare Pages
        run: |
          cd dist
          zip -r ../deploy.zip .
          cd ..
          
          # Get latest deployment ID for tracking
          echo "Deploying to Cloudflare Pages..."
          
          # Upload and create deployment
          ZIP_SIZE=$(wc -c < deploy.zip)
          MANIFEST="[{"prefix":"",files":[]}"
          
          # Use wrangler to deploy
          npx wrangler@4 pages deploy dist \
            --project-name=misub-etc \
            --branch=main \
            --env-vars-json '{{
              "ADMIN_PASSWORD": "MiSub_ahZ6lB673D8w",
              "COOKIE_SECRET": "fb8ce5d2-e7b2-47be-bd09-f622eab89685"
            }}'
