name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: |
          # Build the deployment zip with manifest
          cd dist
          zip -r ../deploy.zip .
          cd ..
          
          # Create manifest
          python3 -c "
          import os, json, hashlib
          manifest = {'name': 'misub', 'version': 1, 'files': {}}
          for root, dirs, files in os.walk('dist'):
              for f in files:
                  fp = os.path.join(root, f)
                  arc = os.path.relpath(fp, 'dist')
                  with open(fp, 'rb') as fh:
                      manifest['files'][arc] = {'hash': hashlib.sha256(fh.read()).hexdigest()}
          with open('manifest.json', 'w') as fh:
              json.dump(manifest, fh)
          "
          
          # Upload with env vars using the Pages API
          curl -X POST "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/misub/deployments" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -F "manifest=@manifest.json" \
            -F "file=@deploy.zip" \
            -F "env_vars='{"ADMIN_PASSWORD":"MiSub_ahZ6lB673D8w","COOKIE_SECRET":"BT~gIc$)VdjB7DOw-\\tbQSJI_m=VBdI~PD7quhU8t{w2Nyqog,dN*SsL%LR&>3V1"}'" \
            -F "kv_namespaces='{"MISUB_KV":"63976dd1d1974a71895e9ca508df5334"}'" \
            -F "d1_databases='{"MISUB_DB":"6fb46716-f5e0-418b-8898-0b03c856825b"}'" \
            -F "compatibility_date=2026-07-17" \
            -F "compatibility_flags=nodejs_compat"
          
          echo "Deployment complete!"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
