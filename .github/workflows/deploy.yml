name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy with env vars
        run: python3 deploy.py
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Create deploy script
        run: |
          cat > deploy.py << 'PYEOF'
          import os, sys, json, hashlib, zipfile, io, requests

          TOKEN = os.environ["CLOUDFLARE_API_TOKEN"]
          ACCOUNT_ID = os.environ["CLOUDFLARE_ACCOUNT_ID"]
          PROJECT_NAME = "misub"
          
          ADMIN_PASSWORD = "MiSub_ahZ6lB673D8w"
          COOKIE_SECRET = "BT~gIc$)VdjB7DOw-\tbQSJI_m=VBdI~PD7quhU8t{w2Nyqog,dN*SsL%LR&>3V1"
          D1_UUID = "6fb46716-f5e0-418b-8898-0b03c856825b"
          KV_ID = "63976dd1d1974a71895e9ca508df5334"
          
          headers = {"Authorization": f"Bearer {TOKEN}"}
          
          # Build manifest
          manifest_files = {}
          dist_dir = "dist"
          for root, dirs, files in os.walk(dist_dir):
              for file in files:
                  file_path = os.path.join(root, file)
                  arcname = os.path.relpath(file_path, dist_dir)
                  with open(file_path, "rb") as f:
                      content = f.read()
                  content_hash = hashlib.sha256(content).hexdigest()
                  ext = os.path.splitext(file)[1].lower()
                  ct_map = {
                      ".html": "text/html", ".css": "text/css", ".js": "application/javascript",
                      ".json": "application/json", ".png": "image/png", ".svg": "image/svg+xml",
                      ".ico": "image/x-icon", ".txt": "text/plain",
                  }
                  manifest_files[arcname] = {"hash": content_hash, "contentType": ct_map.get(ext, "application/octet-stream")}
          
          manifest = {
              "name": PROJECT_NAME,
              "version": 1,
              "files": manifest_files,
              "compatibility_date": "2026-07-17",
              "compatibility_flags": ["nodejs_compat"],
              "env_vars": [
                  {"key": "ADMIN_PASSWORD", "value": ADMIN_PASSWORD},
                  {"key": "COOKIE_SECRET", "value": COOKIE_SECRET},
              ],
              "kv_namespaces": [{"binding": "MISUB_KV", "id": KV_ID}],
              "d1_databases": [{"binding": "MISUB_DB", "id": D1_UUID}],
          }
          
          # Create zip
          zip_buffer = io.BytesIO()
          with zipfile.ZipFile(zip_buffer, "w", zipfile.ZIP_DEFLATED) as zf:
              zf.writestr("__manifest.json", json.dumps(manifest))
              for root, dirs, files in os.walk(dist_dir):
                  for file in files:
                      file_path = os.path.join(root, file)
                      arcname = os.path.relpath(file_path, dist_dir)
                      zf.write(file_path, arcname)
          
          zip_data = zip_buffer.getvalue()
          print(f"Zip size: {len(zip_data)} bytes")
          
          # Upload deployment
          upload_url = f"https://api.cloudflare.com/client/v4/accounts/{ACCOUNT_ID}/pages/projects/{PROJECT_NAME}/deployments"
          
          files = {
              "manifest": (None, json.dumps(manifest)),
              "file": ("deploy.zip", zip_data, "application/zip"),
          }
          resp = requests.post(upload_url, headers={"Authorization": f"Bearer {TOKEN}"}, files=files, timeout=120)
          print(f"Status: {resp.status_code}")
          data = resp.json()
          result = data.get("result", {})
          print(f"Deployment ID: {result.get('id')}")
          print(f"URL: {result.get('url')}")
          print(f"Env vars in deployment: {result.get('env_vars', [])}")
          PYEOF
        working-directory: .
