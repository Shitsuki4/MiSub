name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy with env vars
        run: |
          # Deploy with wrangler (handles functions correctly)
          npx wrangler pages deploy dist --project-name=misub --branch=main
          
          # Wait for deployment to stabilize
          sleep 30
          
          # Set env vars via Cloudflare Pages API
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/misub/environments/production/deployment_configs" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "env_vars": [
                {"key": "ADMIN_PASSWORD", "value": "MiSub_ahZ6lB673D8w"},
                {"key": "COOKIE_SECRET", "value": "BT~gIc$)VdjB7DOw-\\tbQSJI_m=VBdI~PD7quhU8t{w2Nyqog,dN*SsL%LR&>3V1"}
              ],
              "kv_namespaces": [{"binding": "MISUB_KV", "id": "63976dd1d1974a71895e9ca508df5334"}],
              "d1_databases": [{"binding": "MISUB_DB", "id": "6fb46716-f5e0-418b-8898-0b03c856825b"}]
            }'
          
          echo ""
          echo "Env vars set, triggering redeploy..."
          
          # Redeploy to pick up the new env vars
          sleep 10
          npx wrangler pages deploy dist --project-name=misub --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
