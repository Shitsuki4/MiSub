name = "misub"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]
main = "functions"
pages_build_output_dir = "dist"

# D1 数据库绑定
[[d1_databases]]
binding = "MISUB_DB"
database_name = "misub-db"
database_id = "6fb46716-f5e0-418b-8898-0b03c856825b"

# 环境变量
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"
ENABLE_CRON = "true"